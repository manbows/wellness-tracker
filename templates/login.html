{% extends "base.html" %}

{% block content %}

<div class="login-container">
    <h1>Welcome</h1>
    <p>To your daily moment of reflection.</p>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <div class="login-box">
        <input type="text" id="username" placeholder="Username" maxlength="50" autocomplete="username">
        <input type="password" id="pin" placeholder="4 digit PIN" maxlength="4" autocomplete="current-password">

        <div class="login-buttons">
            <form method="POST" onsubmit="copyFields('register')">
                <input type="hidden" name="username" id="username-register">
                <input type="hidden" name="pin" id="pin-register">
                <input type="hidden" name="action" value="register">
                <button type="submit" class="secondary">Register</button>
            </form>
            <form method="POST" onsubmit="copyFields('login')">
                <input type="hidden" name="username" id="username-login">
                <input type="hidden" name="pin" id="pin-login">
                <input type="hidden" name="action" value="login">
                <button type="submit">Sign in →</button>
            </form>
        </div>
    </div>
</div>

<script>
function copyFields(action) {
    document.getElementById('username-' + action).value = document.getElementById('username').value
    document.getElementById('pin-' + action).value = document.getElementById('pin').value
}
</script>

{% endblock %}
